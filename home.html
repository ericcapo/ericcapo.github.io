<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capo Lab - Photo Gallery</title>
    <style>
        /* Page-specific gallery styles */
        .gallery-section {
            margin-bottom: 40px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .photo-card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .photo-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid #0077be;
        }
        
        .photo-info {
            padding: 15px;
        }
        
        .photo-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #0077be;
        }
        
        .photo-date {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .photo-description {
            font-size: 0.95em;
            line-height: 1.5;
            color: #333;
        }
        
        .timeline-indicator {
            text-align: center;
            margin: 30px 0;
            padding: 10px;
            background-color: rgba(240, 248, 255, 0.9);
            border-radius: 5px;
            font-style: italic;
            color: #0077be;
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="content">
        <h2 class="section-title underline">Lab Gallery</h2>
        <p>Explore moments from our lab activities, field work, and team events. Scroll down to see older photos from our lab's history.</p>

        <div class="gallery-section">
            <h3 class="section-title">Recent Photos</h3>
            <div class="gallery-grid">
                <div class="photo-card">
                    <img src="images/gallery/fieldwork-2024.jpg" alt="Fieldwork 2024" class="photo-image">
                    <div class="photo-info">
                        <div class="photo-title">Baltic Sea Expedition</div>
                        <div class="photo-date">September 2024</div>
                        <div class="photo-description">Collecting sediment samples from the Baltic Sea for sedDNA analysis.</div>
                    </div>
                </div>
                <!-- Add more photo cards as needed -->
            </div>
        </div>
    </div>
    
    <script src="js/template-loader.js"></script>
</body>
</html>
